<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İlaç Takibi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
      min-height: 100vh;
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }
    @keyframes ripple { 0%{transform:scale(0.6);opacity:1} 100%{transform:scale(2.2);opacity:0} }
    @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.22)} 100%{transform:scale(1)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .ripple-ring { position:absolute;border-radius:50%;pointer-events:none;animation:ripple 0.45s ease-out forwards; }
    #banner-warn,#banner-ok { display:none; }
    #header { background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);padding:20px 20px 0;backdrop-filter:blur(12px); }
    .header-top { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
    .title { font-size:21px;font-weight:700;letter-spacing:-0.5px; }
    .subtitle { font-size:11px;color:#64748b;margin-top:2px; }
    .sync-row { display:flex;align-items:center;gap:6px;margin-top:4px; }
    .sync-dot { width:7px;height:7px;border-radius:50%;background:#64748b;flex-shrink:0; }
    .sync-dot.ok { background:#22c55e; }
    .sync-dot.saving { background:#f59e0b;animation:pulse 0.8s infinite; }
    .sync-dot.error { background:#ef4444; }
    .sync-text { font-size:10px;color:#64748b; }
    .week6-badge { background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:6px 12px;font-size:11px;font-weight:600; }
    .view-toggle { display:flex;gap:8px;margin-bottom:14px; }
    .view-btn { background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 14px;color:#64748b;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s; }
    .view-btn.active { background:rgba(99,102,241,0.3);border-color:rgba(99,102,241,0.6);color:#a5b4fc; }
    .day-tabs { display:flex;gap:3px;overflow-x:auto;padding-bottom:1px; }
    .day-tab { flex-shrink:0;background:transparent;border:1px solid transparent;border-bottom:2px solid transparent;border-radius:10px 10px 0 0;padding:8px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px; }
    .day-tab.active { background:rgba(99,102,241,0.25);border-color:rgba(99,102,241,0.5);border-bottom-color:rgba(99,102,241,0.4); }
    .day-tab.today { border-bottom-color:#6366f1 !important; }
    .day-tab span { font-size:11px;font-weight:500;color:#64748b; }
    .day-tab.active span { color:#c4b5fd; }
    .day-tab.today span { color:#a5b4fc;font-weight:700; }
    .tab-bar { width:26px;height:3px;border-radius:2px;background:rgba(255,255,255,0.1);overflow:hidden; }
    .tab-bar-fill { height:100%;border-radius:2px;background:#6366f1;transition:width 0.3s; }
    .tab-bar-fill.complete { background:#22c55e; }
    #content { padding:18px 20px; }
    .day-summary { background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between; }
    .day-summary-label { font-size:12px;color:#94a3b8;margin-bottom:3px; }
    .day-summary-count { font-size:19px;font-weight:700; }
    .day-summary-count span { font-size:12px;color:#64748b;font-weight:400; }
    .circle-wrap { width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center; }
    .circle-inner { width:34px;height:34px;border-radius:50%;background:#1a1a3e;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#a5b4fc; }
    .med-card { background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;margin-bottom:14px; }
    .med-card-header { display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06); }
    .med-card-name { font-weight:700;font-size:14px; }
    .med-card-note { font-size:10px;margin-top:2px; }
    .med-table { width:100%;border-collapse:collapse;min-width:300px; }
    .med-table th,.med-table td { text-align:center;padding:5px 3px;font-size:10px;color:#475569; }
    .med-table td:first-child { text-align:left;padding-left:12px;color:#334155;width:50px; }
    .taken-wrap { position:relative;display:inline-flex;align-items:center;justify-content:center; }
    .taken-btn { width:30px;height:30px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.18s cubic-bezier(.34,1.56,.64,1);position:relative; }
    .taken-btn.taken { color:#fff;border:none !important; }
    .inactive-cell { width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:#2d3748; }
    .day-row { border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:all 0.25s ease; }
    .day-row-name { font-weight:600;font-size:14px; }
    .day-row-meta { display:flex;align-items:center;gap:6px;margin-top:3px; }
    .dose-badge { border-radius:6px;padding:2px 8px;font-weight:700;font-size:10px; }
    .dose-note { font-size:10px;color:#475569; }
    .dose-note.taken-note { color:#6ee7b7;font-weight:600; }
    .day-btn-wrap { position:relative;flex-shrink:0; }
    .day-btn { width:44px;height:44px;border-radius:13px;border:none;background:rgba(255,255,255,0.08);cursor:pointer;color:#4a5568;transition:all 0.2s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;font-size:20px; }
    .day-btn.taken { color:#fff; }
    .day-inactive-ph { width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:#2d3748;font-size:18px; }
    .info-card { margin-top:20px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px 16px; }
    .info-label { font-size:11px;color:#475569;margin-bottom:10px;font-weight:600;letter-spacing:0.5px; }
    .info-row { display:flex;gap:10px;align-items:flex-start;margin-bottom:6px;font-size:11px; }
    .banner { padding:12px 20px;display:flex;align-items:center;gap:10px; }
    .banner-close { background:none;border:none;font-size:18px;cursor:pointer;padding:0 4px;margin-left:auto; }
    #loading-screen { position:fixed;inset:0;background:linear-gradient(135deg,#0f0c29 0%,#1a1a3e 50%,#24243e 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999; }
    .spinner { width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,0.1);border-top-color:#6366f1;animation:spin 0.8s linear infinite; }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:#64748b">Veriler yükleniyor...</div>
</div>

<div id="banner-warn" class="banner" style="background:linear-gradient(135deg,#92400e,#78350f);border-bottom:1px solid #d97706;">
  <span style="font-size:18px">⚠️</span>
  <div style="flex:1">
    <div style="font-size:13px;font-weight:700;color:#fde68a">D Vitamini — 6. Hafta Bitiyor!</div>
    <div style="font-size:12px;color:#fcd34d;margin-top:2px" id="warn-text"></div>
  </div>
  <button class="banner-close" style="color:#fcd34d" onclick="closeBanner('banner-warn')">×</button>
</div>
<div id="banner-ok" class="banner" style="background:linear-gradient(135deg,#064e3b,#065f46);border-bottom:1px solid #10b981;">
  <span style="font-size:18px">✅</span>
  <div style="flex:1">
    <div style="font-size:13px;font-weight:700;color:#6ee7b7">D Vitamini — 6 Hafta Tamamlandı!</div>
    <div style="font-size:12px;color:#a7f3d0;margin-top:2px">Artık günde 1 puf'a geçtiniz. Tebrikler!</div>
  </div>
  <button class="banner-close" style="color:#6ee7b7" onclick="closeBanner('banner-ok')">×</button>
</div>

<div id="header">
  <div class="header-top">
    <div>
      <div class="title">💊 İlaç Takibi</div>
      <div class="subtitle">Başlangıç: 24 Mayıs 2026</div>
      <div class="sync-row">
        <div class="sync-dot" id="sync-dot"></div>
        <span class="sync-text" id="sync-text">Yükleniyor...</span>
      </div>
    </div>
    <div class="week6-badge" id="week6-badge"></div>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-week" onclick="setView('week')">📅 Haftalık</button>
    <button class="view-btn" id="btn-day" onclick="setView('day')">📋 Günlük</button>
  </div>
  <div class="day-tabs" id="day-tabs"></div>
</div>

<div id="content">
  <div class="day-summary">
    <div>
      <div class="day-summary-label" id="summary-dayname"></div>
      <div class="day-summary-count"><span id="summary-count"></span> <span>doz alındı</span></div>
    </div>
    <div class="circle-wrap" id="summary-circle">
      <div class="circle-inner" id="summary-pct"></div>
    </div>
  </div>
  <div id="view-week"></div>
  <div id="view-day" style="display:none"></div>
  <div class="info-card" id="info-card"></div>
</div>

<script>
  // ── SUPABASE CONFIG ─────────────────────────────────────
  const SB_URL  = 'https://ewvkbzrbmahrogyvhpyj.supabase.co';
  const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3dmtienJibWFocm9neXZocHlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzkwOTksImV4cCI6MjA5NTE1NTA5OX0.FJaiRSJFjPRi7guvvqFf2lKVgNpS-Fc5NOz6kt-TNyY';
  const HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' };
  const TABLE   = SB_URL + '/rest/v1/ilac_data';

  // ── CONSTANTS ───────────────────────────────────────────
  const DAYS       = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  const FULL_DAYS  = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];
  const FOLIK_DAYS = [6, 3];
  const WEEK6_END  = '2026-07-05';

  // ── STATE ───────────────────────────────────────────────
  let taken   = {};
  let banners = {};
  let saveTimer = null;

  // ── DATE HELPERS ────────────────────────────────────────
  function getWeekStart() {
    const now = new Date(); now.setHours(0,0,0,0);
    const day = now.getDay();
    const mon = new Date(now);
    mon.setDate(now.getDate() + (day === 0 ? -6 : 1 - day));
    return mon;
  }
  const weekStart = getWeekStart();
  function dateStr(di) {
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + di);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function todayStr() {
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  const todayIdx    = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
  const after6weeks = todayStr() > WEEK6_END;
  const daysLeft    = Math.ceil((new Date(WEEK6_END) - new Date(todayStr())) / 86400000);
  const dvDose      = after6weeks ? '1 puf' : '3 puf';
  let activeDay     = todayIdx;
  let currentView   = 'week';

  // ── ACTIVE CHECKS ───────────────────────────────────────
  function isDvActive(di)    { return dateStr(di) >= '2026-05-24'; }
  function isFolikActive(di) { return dateStr(di) >= '2026-05-24' && FOLIK_DAYS.includes(di); }

  // ── TAKEN ───────────────────────────────────────────────
  function isTaken(med, di)  { return !!taken[med + '_' + dateStr(di)]; }

  function toggleTaken(med, di) {
    const k = med + '_' + dateStr(di);
    taken[k] = !taken[k];
    render();
    scheduleSave();
  }

  // ── SYNC STATUS ─────────────────────────────────────────
  function syncStatus(status, text) {
    document.getElementById('sync-dot').className = 'sync-dot ' + status;
    document.getElementById('sync-text').textContent = text;
  }

  // ── SUPABASE LOAD ───────────────────────────────────────
  async function loadData() {
    try {
      const res = await fetch(TABLE + '?select=key,value', { headers: HEADERS });
      if (!res.ok) throw new Error(res.status);
      const rows = await res.json();
      rows.forEach(r => {
        if (r.key === 'taken')   taken   = JSON.parse(r.value || '{}');
        if (r.key === 'banners') banners = JSON.parse(r.value || '{}');
      });
      syncStatus('ok', 'Senkronize ✓');
    } catch(e) {
      syncStatus('error', 'Bağlantı hatası');
      console.error(e);
    }
  }

  // ── SUPABASE SAVE ───────────────────────────────────────
  function scheduleSave() {
    syncStatus('saving', 'Kaydediliyor...');
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(saveData, 800);
  }

  async function saveData() {
    try {
      const rows = [
        { key: 'taken',   value: JSON.stringify(taken) },
        { key: 'banners', value: JSON.stringify(banners) },
      ];
      const res = await fetch(TABLE, {
        method: 'POST',
        headers: { ...HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(rows)
      });
      if (!res.ok) throw new Error(res.status);
      syncStatus('ok', 'Kaydedildi ✓');
    } catch(e) {
      syncStatus('error', 'Kayıt hatası!');
      console.error(e);
    }
  }

  // ── BANNER ──────────────────────────────────────────────
  window.closeBanner = function(id) {
    document.getElementById(id).style.display = 'none';
    banners[id] = true; scheduleSave();
  };
  function renderBanners() {
    if (!banners['banner-warn'] && !after6weeks && daysLeft <= 7) {
      document.getElementById('banner-warn').style.display = 'flex';
      document.getElementById('warn-text').textContent = daysLeft + ' gün sonra dozu 3 puf → 1 puf\'a düşür.';
    }
    if (!banners['banner-ok'] && after6weeks) {
      document.getElementById('banner-ok').style.display = 'flex';
    }
  }

  // ── TOTAL ───────────────────────────────────────────────
  function totalForDay(di) {
    let total=0, done=0;
    if (isDvActive(di))    { total++; if (isTaken('dv',di))    done++; }
    if (isFolikActive(di)) { total++; if (isTaken('folik',di)) done++; }
    return { total, done };
  }

  // ── RIPPLE ───────────────────────────────────────────────
  function doRipple(id, color, size) {
    const el = document.getElementById(id); if (!el) return;
    const r = document.createElement('div');
    r.className = 'ripple-ring';
    r.style.cssText = `inset:-${size||6}px;border:2px solid ${color};`;
    el.appendChild(r); setTimeout(() => r.remove(), 500);
  }

  // ── CLICK HANDLERS ───────────────────────────────────────
  window.handleTakenClick = function(med, di, color) {
    const was = isTaken(med, di);
    toggleTaken(med, di);
    if (!was) setTimeout(() => doRipple('tw_'+med+'_'+di, color, 6), 10);
  };
  window.handleDayClick = function(med, di, color) {
    const was = isTaken(med, di);
    toggleTaken(med, di);
    if (!was) setTimeout(() => doRipple('dw_'+med, color, 10), 10);
  };

  // ── WEEK VIEW ────────────────────────────────────────────
  function makeTakenBtn(med, di, color) {
    const t = isTaken(med, di);
    return `<div class="taken-wrap" id="tw_${med}_${di}">
      <button class="taken-btn${t?' taken':''}"
        style="${t?`background:${color};box-shadow:0 2px 10px ${color}66;`:`border:1.5px solid ${color}66;color:${color}99;`}"
        onclick="handleTakenClick('${med}',${di},'${color}')">✓</button></div>`;
  }

  function renderWeekView() {
    const meds = [
      { id:'dv',    name:'D Vitamini', emoji:'☀️', color:'#eab308',
        note: after6weeks?'Günde 1 puf':`Günde 3 puf (6. haftaya ${daysLeft}g kaldı)`,
        noteColor: after6weeks?'#6ee7b7':'#fcd34d', isActive: isDvActive },
      { id:'folik', name:'Folik Asit', emoji:'🌸', color:'#ec4899',
        note:'Paz + Per · Sabah', noteColor:'#f9a8d4', isActive: isFolikActive },
    ];
    let html = '';
    meds.forEach(m => {
      let heads='', cells='';
      for (let di=0;di<7;di++) {
        const isT = di===todayIdx;
        heads += `<th style="font-weight:${isT?700:400};color:${isT?'#a5b4fc':'#475569'};font-size:10px;padding:5px 3px">${DAYS[di]}</th>`;
        cells += `<td style="text-align:center;padding:5px 3px">${m.isActive(di)?makeTakenBtn(m.id,di,m.color):'<div class="inactive-cell">—</div>'}</td>`;
      }
      html += `<div class="med-card">
        <div class="med-card-header" style="background:linear-gradient(90deg,${m.color}10 0%,transparent 60%)">
          <span style="font-size:18px;margin-top:1px">${m.emoji}</span>
          <div><div class="med-card-name">${m.name}</div>
          <div class="med-card-note" style="color:${m.noteColor}">${m.note}</div></div>
        </div>
        <div style="overflow-x:auto"><table class="med-table">
          <thead><tr><th style="text-align:left;padding-left:12px;color:#334155;width:50px">Sabah</th>${heads}</tr></thead>
          <tbody><tr><td></td>${cells}</tr></tbody>
        </table></div></div>`;
    });
    document.getElementById('view-week').innerHTML = html;
  }

  // ── DAY VIEW ─────────────────────────────────────────────
  function renderDayView() {
    const di = activeDay;
    function row(med, name, emoji, color, active, dose, note) {
      const t = isTaken(med, di);
      const bg = t?`linear-gradient(90deg,${color}12 0%,rgba(255,255,255,0.03) 100%)`:active?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.02)';
      const bdr = t?color+'44':active?'rgba(255,255,255,0.09)':'rgba(255,255,255,0.04)';
      const btn = active
        ? `<div class="day-btn-wrap" id="dw_${med}">
            <button class="day-btn${t?' taken':''}"
              style="${t?`background:${color};box-shadow:0 4px 18px ${color}55;`:''}"
              onclick="handleDayClick('${med}',${di},'${color}')">${t?'✓':'○'}</button></div>`
        : `<div class="day-inactive-ph">—</div>`;
      return `<div class="day-row" style="background:${bg};border:1px solid ${bdr};opacity:${active?1:0.45}">
        <span style="font-size:20px">${emoji}</span>
        <div style="flex:1">
          <div class="day-row-name" style="color:${t?'#e2e8f0':active?'#c4c4d4':'#64748b'}">${name}</div>
          <div class="day-row-meta">
            <span class="dose-badge" style="background:${color}22;color:${color}">${dose}</span>
            <span class="dose-note${t?' taken-note':''}">${t?'✓ Alındı':note}</span>
          </div>
        </div>${btn}</div>`;
    }
    let html = `<div style="font-size:12px;color:#64748b;margin-bottom:10px">${FULL_DAYS[di]} — Sabah dozları</div>`;
    html += row('dv','D Vitamini','☀️','#eab308',isDvActive(di),dvDose,after6weeks?'İdame dozu':`${daysLeft}g sonra 1 puf'a geç`);
    html += row('folik','Folik Asit','🌸','#ec4899',isFolikActive(di),'1 tablet',isFolikActive(di)?'Bugün alınacak':'Bugün yok');
    document.getElementById('view-day').innerHTML = html;
  }

  // ── DAY TABS ─────────────────────────────────────────────
  function renderDayTabs() {
    let html='';
    for (let i=0;i<7;i++) {
      const {total,done} = totalForDay(i);
      const pct = total>0?done/total:0;
      const isT=i===todayIdx, isA=i===activeDay;
      const bar = total>0?`<div class="tab-bar"><div class="tab-bar-fill${pct===1?' complete':''}" style="width:${pct*100}%"></div></div>`:'';
      html += `<button class="day-tab${isA?' active':''}${isT?' today':''}" onclick="setActiveDay(${i})"><span>${DAYS[i]}</span>${bar}</button>`;
    }
    document.getElementById('day-tabs').innerHTML = html;
  }

  // ── SUMMARY ──────────────────────────────────────────────
  function renderSummary() {
    const {total,done} = totalForDay(activeDay);
    const pct = total>0?done/total:0;
    document.getElementById('summary-dayname').textContent = FULL_DAYS[activeDay];
    document.getElementById('summary-count').textContent   = `${done}/${total}`;
    const c = pct===1?'#22c55e':'#6366f1';
    document.getElementById('summary-circle').style.background = `conic-gradient(${c} 0deg,${c} ${pct*360}deg,rgba(255,255,255,0.08) ${pct*360}deg 360deg)`;
    document.getElementById('summary-pct').textContent = total>0?Math.round(pct*100)+'%':'0%';
    document.getElementById('summary-pct').style.color = pct===1?'#4ade80':'#a5b4fc';
  }

  // ── INFO ─────────────────────────────────────────────────
  function renderInfo() {
    document.getElementById('info-card').innerHTML = `
      <div class="info-label">BİLGİ</div>
      <div class="info-row"><span style="font-size:14px">☀️</span><div><span style="font-weight:700;color:#eab308">D Vitamini: </span><span style="color:#64748b">${after6weeks?'Günde 1 puf — idame dozu':`İlk 6 hafta: 3 puf/gün • ${daysLeft}g kaldı`}</span></div></div>
      <div class="info-row"><span style="font-size:14px">🌸</span><div><span style="font-weight:700;color:#ec4899">Folik Asit: </span><span style="color:#64748b">Haftada 2 gün (Paz + Per) — günde 1 tablet</span></div></div>
      <div class="info-row"><span style="font-size:14px">📅</span><div><span style="font-weight:700;color:#6366f1">6. Hafta Sonu: </span><span style="color:#64748b">5 Temmuz 2026 — D vitamini dozunu düşür</span></div></div>`;
  }

  // ── BADGE ────────────────────────────────────────────────
  function renderBadge() {
    const el = document.getElementById('week6-badge');
    el.style.color = after6weeks?'#6ee7b7':'#fcd34d';
    el.textContent = after6weeks?'✅ 6. hafta geçildi':`⏳ 6. haftaya ${daysLeft}g`;
  }

  // ── RENDER ───────────────────────────────────────────────
  function render() {
    renderBadge(); renderDayTabs(); renderSummary();
    currentView==='week' ? renderWeekView() : renderDayView();
    renderInfo();
  }

  // ── CONTROLS ─────────────────────────────────────────────
  window.setView = function(v) {
    currentView = v;
    document.getElementById('view-week').style.display = v==='week'?'':'none';
    document.getElementById('view-day').style.display  = v==='day' ?'':'none';
    document.getElementById('btn-week').classList.toggle('active',v==='week');
    document.getElementById('btn-day').classList.toggle('active',v==='day');
    render();
  };
  window.setActiveDay = function(i) { activeDay=i; render(); };

  // ── AUTO REFRESH (her 30 sn'de veriyi çek) ──────────────
  setInterval(async () => {
    await loadData();
    render();
  }, 30000);

  // ── INIT ─────────────────────────────────────────────────
  (async function() {
    await loadData();
    document.getElementById('loading-screen').style.display = 'none';
    renderBanners();
    render();
  })();
</script>
</body>
</html>
